kind = "web"
previewPath = "/guide-presentation/"
title = "Ghost of Yōtei — 100% Completion Guide Deck"
version = "1.0.0"
id = "artifacts/guide-presentation"
router = "path"

[[services]]
name = "web"
paths = [ "/guide-presentation/" ]
localPort = 24793

[services.development]
run = "pnpm --filter @workspace/guide-presentation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/guide-presentation", "run", "build" ]
serve = "static"
publicDir = "artifacts/guide-presentation/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24793"
BASE_PATH = "/guide-presentation/"
