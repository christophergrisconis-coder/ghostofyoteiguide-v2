openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reports
    description: Issue report operations
paths:
  /reports:
    post:
      operationId: submitReport
      tags: [reports]
      summary: Submit an issue report
      description: Submit a report about incorrect or missing content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportRecord"
        "400":
          description: Invalid input
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ReportCategory:
      type: string
      enum:
        - wrong_info
        - missing_item
        - other
    ReportRequest:
      type: object
      properties:
        category:
          $ref: "#/components/schemas/ReportCategory"
        note:
          type: string
          nullable: true
      required:
        - category
    ReportRecord:
      type: object
      properties:
        id:
          type: integer
        category:
          $ref: "#/components/schemas/ReportCategory"
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - category
        - createdAt

